<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mochi Hunt — Powered by GenLayer</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --neon-cyan:#00f5ff;
  --neon-purple:#bf5fff;
  --neon-pink:#ff2d78;
  --neon-yellow:#ffe600;
  --bg-dark:#06040f;
  --bg-mid:#0d0820;
  --panel:#110d2a;
  --wall-color:#1a0d4d;
  --wall-glow:#3d1aff;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg-dark);font-family:'Rajdhani',sans-serif;touch-action:none}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;
  background:radial-gradient(ellipse at 50% 0%,#1a0a3a 0%,#06040f 70%)}

/* ===== SCREENS ===== */
.screen{display:none;flex-direction:column;align-items:center;justify-content:center;
  width:100%;padding:16px;animation:fadeIn .4s ease;overflow-y:auto;max-height:100vh}
.screen.active{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ===== START SCREEN ===== */
#start-screen{gap:14px;max-width:400px;margin:0 auto}
.game-title{font-family:'Orbitron',sans-serif;font-size:clamp(1.6rem,8vw,3.5rem);font-weight:900;
  background:linear-gradient(135deg,var(--neon-cyan),var(--neon-purple),var(--neon-pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:4px;text-align:center;line-height:1.1}
.subtitle{color:var(--neon-purple);font-size:.85rem;letter-spacing:3px;text-transform:uppercase;
  font-family:'Orbitron',sans-serif;font-weight:400;opacity:.8;text-align:center}
.mascot-preview{width:clamp(80px,18vw,120px);height:clamp(80px,18vw,120px);object-fit:contain;
  filter:drop-shadow(0 0 20px var(--neon-cyan));animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.input-group{display:flex;flex-direction:column;gap:8px;width:100%}
.input-group label{color:var(--neon-cyan);font-size:.8rem;letter-spacing:2px;text-transform:uppercase;font-family:'Orbitron',sans-serif}
.neon-input{background:rgba(0,245,255,.05);border:1px solid var(--neon-cyan);border-radius:6px;
  color:#fff;font-family:'Rajdhani',sans-serif;font-size:1.1rem;padding:10px 16px;
  outline:none;transition:all .2s;width:100%}
.neon-input:focus{border-color:var(--neon-purple);box-shadow:0 0 12px rgba(191,95,255,.4)}
.diff-row{display:flex;gap:8px;justify-content:center;width:100%}
.diff-btn{background:transparent;border:1px solid rgba(255,255,255,.2);border-radius:6px;
  color:rgba(255,255,255,.5);cursor:pointer;font-family:'Orbitron',sans-serif;font-size:.7rem;
  padding:8px 0;transition:all .2s;letter-spacing:1px;flex:1}
.diff-btn.active{border-color:var(--neon-purple);background:rgba(191,95,255,.15);
  color:var(--neon-purple);box-shadow:0 0 10px rgba(191,95,255,.3)}
.btn-primary{background:linear-gradient(135deg,var(--neon-purple),var(--neon-pink));
  border:none;border-radius:8px;color:#fff;cursor:pointer;font-family:'Orbitron',sans-serif;
  font-size:.95rem;font-weight:700;letter-spacing:2px;padding:14px 40px;
  text-transform:uppercase;transition:all .2s;box-shadow:0 0 20px rgba(191,95,255,.4);width:100%}
.btn-primary:active{transform:scale(0.97)}
.btn-secondary{background:transparent;border:1px solid var(--neon-cyan);border-radius:8px;
  color:var(--neon-cyan);cursor:pointer;font-family:'Orbitron',sans-serif;font-size:.8rem;
  font-weight:600;letter-spacing:2px;padding:10px 28px;text-transform:uppercase;
  transition:all .2s;width:100%;text-align:center}
.btn-secondary:active{background:rgba(0,245,255,.08)}

/* ===== GAME SCREEN ===== */
#game-screen{flex-direction:row;gap:20px;align-items:flex-start;justify-content:center;
  max-width:1000px;padding:12px;overflow:visible}
#game-area{display:flex;flex-direction:column;align-items:center;gap:0}
#game-canvas{border:2px solid var(--wall-glow);border-radius:4px;
  box-shadow:0 0 30px rgba(61,26,255,.5);image-rendering:crisp-edges;display:block}

/* Mobile HUD bar (shown on mobile, hidden on desktop) */
#mobile-hud{display:none;width:100%;background:var(--panel);border:1px solid rgba(191,95,255,.2);
  border-radius:8px;padding:8px 12px;gap:0;flex-direction:column}
#mobile-hud-top{display:flex;justify-content:space-between;align-items:center;width:100%}
#mobile-hud-bottom{display:flex;justify-content:space-between;align-items:center;
  width:100%;padding-top:6px;border-top:1px solid rgba(255,255,255,.05);margin-top:6px}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px}
.hud-item .panel-label{font-size:.55rem;letter-spacing:1.5px}
.hud-item .panel-value{font-size:.9rem}

/* Desktop side panel */
#side-panel{display:flex;flex-direction:column;gap:12px;min-width:160px;padding-top:2px}
.panel-card{background:var(--panel);border:1px solid rgba(191,95,255,.25);border-radius:10px;
  padding:12px 14px;display:flex;flex-direction:column;gap:5px}
.panel-label{color:rgba(255,255,255,.4);font-size:.65rem;letter-spacing:2px;text-transform:uppercase;
  font-family:'Orbitron',sans-serif}
.panel-value{color:#fff;font-size:1.4rem;font-weight:700;font-family:'Orbitron',sans-serif;line-height:1}
.panel-value.cyan{color:var(--neon-cyan)}
.panel-value.purple{color:var(--neon-purple)}
.panel-value.pink{color:var(--neon-pink)}
.lives-row{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.life-icon{width:20px;height:20px;object-fit:contain;filter:drop-shadow(0 0 4px var(--neon-cyan))}
.btn-icon{background:rgba(0,245,255,.06);border:1px solid rgba(0,245,255,.25);border-radius:6px;
  color:var(--neon-cyan);cursor:pointer;font-size:.8rem;padding:8px 10px;transition:all .2s;
  font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:1px;width:100%;text-align:center}
.btn-icon:active{background:rgba(0,245,255,.15)}

/* Mobile action buttons row */
#mobile-actions{display:none;gap:8px;width:100%;justify-content:center;margin-top:4px}
#mobile-actions .btn-icon{flex:1;padding:8px 4px;font-size:.75rem}

/* D-Pad */
#dpad{display:none;flex-direction:column;align-items:center;gap:4px;margin-top:6px;user-select:none}
.dpad-row{display:flex;gap:4px}
.dpad-btn{width:64px;height:64px;background:rgba(191,95,255,.15);border:2px solid rgba(191,95,255,.4);
  border-radius:12px;color:var(--neon-purple);cursor:pointer;font-size:1.6rem;
  display:flex;align-items:center;justify-content:center;transition:background .08s;touch-action:none;
  -webkit-user-select:none;user-select:none}
.dpad-btn:active,.dpad-btn.pressed{background:rgba(191,95,255,.5);border-color:var(--neon-purple);
  transform:scale(0.93)}
.dpad-center{width:64px;height:64px;background:transparent;border:none;pointer-events:none}

/* ===== OVERLAY ===== */
#overlay{display:none;position:fixed;inset:0;background:rgba(6,4,15,.9);
  align-items:center;justify-content:center;z-index:100;animation:fadeIn .3s ease;padding:16px}
#overlay.active{display:flex}
.overlay-card{background:var(--panel);border:1px solid var(--neon-purple);border-radius:16px;
  padding:28px 24px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px;
  width:100%;max-width:380px;box-shadow:0 0 60px rgba(191,95,255,.3)}
.overlay-title{font-family:'Orbitron',sans-serif;font-size:clamp(1.4rem,6vw,2rem);font-weight:900}
.overlay-title.win{color:var(--neon-cyan);text-shadow:0 0 20px var(--neon-cyan)}
.overlay-title.lose{color:var(--neon-pink);text-shadow:0 0 20px var(--neon-pink)}
.overlay-msg{color:rgba(255,255,255,.8);font-size:1rem;line-height:1.5}
.overlay-score{font-family:'Orbitron',sans-serif;font-size:1.4rem;color:var(--neon-yellow);font-weight:700}
.genlayer-msg{color:var(--neon-cyan);font-size:.85rem;font-family:'Orbitron',sans-serif;
  font-weight:400;border:1px solid rgba(0,245,255,.3);border-radius:8px;padding:10px 14px;
  background:rgba(0,245,255,.05);line-height:1.5;text-align:center}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;width:100%}
.btn-row .btn-primary{width:auto;flex:1;min-width:120px;padding:12px 16px}
.btn-row .btn-secondary{flex:1;min-width:100px;padding:10px 12px}

/* ===== LEADERBOARD SCREEN ===== */
#lb-screen{gap:16px;max-width:480px;width:100%}
.lb-title{font-family:'Orbitron',sans-serif;font-size:clamp(1.2rem,5vw,1.8rem);font-weight:700;
  color:var(--neon-cyan);letter-spacing:2px}
.lb-table{width:100%;border-collapse:collapse}
.lb-table th{color:var(--neon-purple);font-family:'Orbitron',sans-serif;font-size:.65rem;
  letter-spacing:2px;padding:8px 10px;border-bottom:1px solid rgba(191,95,255,.3);text-align:left}
.lb-table td{color:#fff;font-size:.95rem;padding:9px 10px;border-bottom:1px solid rgba(255,255,255,.05);font-weight:600}
.lb-table tr:first-child td{color:var(--neon-yellow)}
.rank-badge{display:inline-block;width:24px;height:24px;border-radius:50%;background:rgba(191,95,255,.2);
  text-align:center;line-height:24px;font-size:.75rem;font-family:'Orbitron',sans-serif}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--neon-purple);border-radius:2px}

/* ===== MOBILE BREAKPOINT ===== */
@media(max-width:700px),(max-height:700px){
  #game-screen{flex-direction:column;align-items:center;gap:6px;padding:6px;justify-content:flex-start;overflow-y:auto}
  #side-panel{display:none}
  #mobile-hud{display:flex}
  #mobile-actions{display:flex}
  #dpad{display:flex}
  #start-screen{gap:10px}
  .mascot-preview{width:70px;height:70px}
  .game-title{font-size:clamp(1.4rem,9vw,2.2rem);letter-spacing:2px}
}
</style>
</head>

<!-- ===== GAME SCREEN ===== -->
<div id="game-screen" class="screen">

  <!-- Mobile HUD (top bar) -->
  <div id="mobile-hud">
    <div id="mobile-hud-top">
      <div class="hud-item">
        <div class="panel-label">Player</div>
        <div id="hud-name-m" class="panel-value cyan" style="font-size:.85rem">MOCHI</div>
      </div>
      <div class="hud-item">
        <div class="panel-label">Score</div>
        <div id="hud-score-m" class="panel-value">0</div>
      </div>
      <div class="hud-item">
        <div class="panel-label">Level</div>
        <div id="hud-level-m" class="panel-value purple">1</div>
      </div>
      <div class="hud-item">
        <div class="panel-label">Lives</div>
        <div id="hud-lives-m" class="lives-row" style="justify-content:center"></div>
      </div>
      <div class="hud-item">
        <div class="panel-label">Dots</div>
        <div id="hud-dots-m" class="panel-value pink">0</div>
      </div>
    </div>
  </div>

  <div id="game-area">
    <canvas id="game-canvas"></canvas>
  </div>

  <!-- Mobile action buttons -->
  <div id="mobile-actions">
    <button class="btn-icon" id="sound-btn-m">🔊</button>
    <button class="btn-icon" id="restart-btn-m">↺ Restart</button>
    <button class="btn-icon" id="menu-btn-m">⌂ Menu</button>
  </div>

  <!-- D-Pad -->
  <div id="dpad">
    <div class="dpad-row">
      <div class="dpad-center"></div>
      <button class="dpad-btn" id="dp-up">▲</button>
      <div class="dpad-center"></div>
    </div>
    <div class="dpad-row">
      <button class="dpad-btn" id="dp-left">◀</button>
      <div class="dpad-center"></div>
      <button class="dpad-btn" id="dp-right">▶</button>
    </div>
    <div class="dpad-row">
      <div class="dpad-center"></div>
      <button class="dpad-btn" id="dp-down">▼</button>
      <div class="dpad-center"></div>
    </div>
  </div>

  <!-- Desktop side panel -->
  <div id="side-panel">
    <div class="panel-card">
      <div class="panel-label">Player</div>
      <div id="hud-name" class="panel-value cyan" style="font-size:.95rem;word-break:break-all">MOCHI</div>
    </div>
    <div class="panel-card">
      <div class="panel-label">Score</div>
      <div id="hud-score" class="panel-value">0</div>
    </div>
    <div class="panel-card">
      <div class="panel-label">Level</div>
      <div id="hud-level" class="panel-value purple">1</div>
    </div>
    <div class="panel-card">
      <div class="panel-label">Lives</div>
      <div id="hud-lives" class="lives-row"></div>
    </div>
    <div class="panel-card">
      <div class="panel-label">Dots Left</div>
      <div id="hud-dots" class="panel-value pink">0</div>
    </div>
    <button class="btn-icon" id="sound-btn">🔊 Sound ON</button>
    <button class="btn-icon" id="restart-btn">↺ Restart</button>
    <button class="btn-icon" id="menu-btn">⌂ Menu</button>
  </div>
</div>

<!-- ===== LEADERBOARD SCREEN ===== -->
<div id="lb-screen" class="screen">
  <div class="lb-title">🏆 HALL OF FAME</div>
  <table class="lb-table">
    <thead><tr><th>#</th><th>Player</th><th>Score</th><th>Level</th></tr></thead>
    <tbody id="lb-body"></tbody>
  </table>
  <button class="btn-secondary" id="lb-back-btn">← Back</button>
</div>

<!-- ===== WIN/LOSE OVERLAY ===== -->
<div id="overlay">
  <div class="overlay-card">

let audioCtx = null;
function getAudioCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq,type,duration,vol=0.3,delay=0){
  if(!soundOn) return;
  try{
    const ac = getAudioCtx();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = type; osc.frequency.value = freq;
    const t = ac.currentTime + delay;
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t+duration);
    osc.start(t); osc.stop(t+duration+.01);
  }catch(e){}

// ==================== DIFFICULTY ====================
function getDiff(lvl){
  const base = {easy:{pSpeed:2,gSpeed:1.2,numG:2,powerDur:8000,releaseInt:5000},
                medium:{pSpeed:2.5,gSpeed:1.6,numG:3,powerDur:6000,releaseInt:4000},
                hard:{pSpeed:3,gSpeed:2.2,numG:4,powerDur:4000,releaseInt:3000}};
  const d = base[difficulty];
  const factor = 1 + (lvl-1)*0.12;
  return {
    playerSpeed: d.pSpeed,
    ghostSpeed: Math.min(d.gSpeed * factor, 4),
    numGhosts: Math.min(d.numG + Math.floor((lvl-1)/3), 4),
    powerDuration: Math.max(d.powerDur - (lvl-1)*300, 2000),
    releaseInterval: Math.max(d.releaseInt - (lvl-1)*200, 1500)
  };
}

// ==================== MAZE ====================
function buildMaze(){
  maze = MAZE_BASE.map(r => r.slice());
  dots = 0;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    if(maze[r][c]===DOT||maze[r][c]===POWER) dots++;
  }
}

// ==================== PLAYER ====================
class Player {
  constructor(){
    this.row = 16; this.col = 9;
    this.x = this.col*CELL + CELL/2;
    this.y = this.row*CELL + CELL/2;
    this.dir = {dx:0,dy:0};
    this.nextDir = {dx:0,dy:0};
    this.speed = getDiff(level).playerSpeed;
    this.dead = false;
    this.deadTimer = 0;
    this.bobT = 0;
    this.radius = CELL*0.45;
  }
  setDir(dx,dy){this.nextDir={dx,dy}}

  // Check if a cell is passable
  cellWalkable(row,col){
    if(row<0||row>=ROWS||col<0||col>=COLS) return false;
    return maze[row][col]!==WALL;
  }

  update(){
    if(this.dead){this.deadTimer++;return}
    this.bobT += 0.08;

    const SNAP = this.speed + 2; // snap threshold in pixels

    // Current grid cell center
    const cx = Math.round(this.x/CELL)*CELL + CELL/2 - CELL; // center of nearest col
    const cy = Math.round(this.y/CELL)*CELL + CELL/2 - CELL; // center of nearest row

    // Nearest grid intersection
    const nearCol = Math.round((this.x - CELL/2) / CELL);
    const nearRow = Math.round((this.y - CELL/2) / CELL);
    const snapX = nearCol * CELL + CELL/2;
    const snapY = nearRow * CELL + CELL/2;

    const offX = Math.abs(this.x - snapX);
    const offY = Math.abs(this.y - snapY);

    // Try to apply queued direction
    if(this.nextDir.dx!==0||this.nextDir.dy!==0){
      const nd = this.nextDir;
      // For horizontal movement we need to be aligned on Y axis, and vice versa
      const aligned = (nd.dx!==0 ? offY<=SNAP : offX<=SNAP);
      const targetRow = nearRow + nd.dy;
      const targetCol = nearCol + nd.dx;
      if(aligned && this.cellWalkable(targetRow, targetCol)){
        // Snap to grid line and commit direction
        if(nd.dx!==0) this.y = snapY;
        if(nd.dy!==0) this.x = snapX;
        this.dir = {...nd};
        this.nextDir = {dx:0,dy:0};
      }
    }

    // Move in current direction
    if(this.dir.dx!==0||this.dir.dy!==0){
      const nextRow = nearRow + this.dir.dy;
      const nextCol = nearCol + this.dir.dx;
      const moving_into_wall = !this.cellWalkable(nextRow, nextCol);

      if(moving_into_wall){
        // Stop exactly at grid center to prevent clipping into walls
        const distToSnap = this.dir.dx!==0 ? offX : offY;
        if(distToSnap < this.speed){
          if(this.dir.dx!==0) this.x = snapX;
          if(this.dir.dy!==0) this.y = snapY;
          this.dir = {dx:0,dy:0};
        } else {
          this.x += this.dir.dx * this.speed;
          this.y += this.dir.dy * this.speed;
        }
      } else {
        this.x += this.dir.dx * this.speed;
        this.y += this.dir.dy * this.speed;
      }
    }

    // Wrap tunnel (row 10)
    if(this.x < 0) this.x = W;
    if(this.x > W) this.x = 0;

    // Collect dots
    const row = Math.round((this.y - CELL/2) / CELL);
    const col = Math.round((this.x - CELL/2) / CELL);
    if(row>=0&&row<ROWS&&col>=0&&col<COLS){
      if(maze[row][col]===DOT){
        maze[row][col]=EMPTY; score+=10; dots--; sfxDot(); updateHUD();
      } else if(maze[row][col]===POWER){
        maze[row][col]=EMPTY; score+=50; dots--; sfxPower(); activatePower(); updateHUD();
      }
    }
    if(dots<=0) triggerWin();
  }
  draw(){
    if(this.dead) return;
    const bob = Math.sin(this.bobT)*3;
    const r = this.radius;
    ctx.save();
    ctx.beginPath();
    ctx.arc(this.x, this.y+bob, r, 0, Math.PI*2);
    ctx.clip();
    // glow ring
    ctx.shadowColor = "var(--neon-cyan)"; ctx.shadowBlur = 12;
    if(mascotImg.complete && mascotImg.naturalWidth>0){
      ctx.drawImage(mascotImg, this.x-r, this.y+bob-r, r*2, r*2);
    } else {
      ctx.fillStyle="#bf5fff"; ctx.fill();
    }
    ctx.restore();
    // power glow
    if(powerActive){
      ctx.beginPath(); ctx.arc(this.x,this.y+bob,r+4,0,Math.PI*2);
      ctx.strokeStyle=`rgba(0,245,255,${0.4+0.3*Math.sin(Date.now()*0.01)})`;
      ctx.lineWidth=2; ctx.stroke();
    }
  }
}

// ==================== GHOSTS ====================
const GHOST_COLORS = ["#ff2d78","#ff9500","#00f5ff","#bf5fff"];
const GHOST_NAMES = ["Blinky","Pinky","Inky","Clyde"];
class Ghost {
  constructor(idx){
    this.idx = idx;
    this.homeRow = 9; this.homeCol = 8+idx%3;
    this.row = this.homeRow; this.col = this.homeCol;
    this.x = this.col*CELL+CELL/2; this.y = this.row*CELL+CELL/2;
    this.color = GHOST_COLORS[idx];
    this.speed = getDiff(level).ghostSpeed;
    this.dir = {dx:0,dy:-1};
    this.released = false;
    this.releaseTimer = idx * getDiff(level).releaseInterval;
    this.frightened = false; this.frightenTimer = 0;
    this.eaten = false; this.eatenTimer = 0;
    this.waveT = 0;
    this.targetRow = 1; this.targetCol = 1;
    this.moved = 0;
  }
  activate(dt){
    this.releaseTimer -= dt;
    if(this.releaseTimer <= 0) this.released = true;
  }
  frighten(dur){
    if(this.eaten) return;
    this.frightened = true; this.frightenTimer = dur;
  }
  update(dt){
    this.waveT += 0.05;
    if(!this.released){ this.activate(dt); return; }
    if(this.eaten){
      this.eatenTimer -= dt;
      if(this.eatenTimer<=0){this.eaten=false;this.frightened=false;
        this.row=this.homeRow;this.col=this.homeCol;
        this.x=this.col*CELL+CELL/2;this.y=this.row*CELL+CELL/2;}
      return;
    }
    if(this.frightened){
      this.frightenTimer -= dt;
      if(this.frightenTimer<=0){this.frightened=false;}
    }
    // set target
    if(!this.frightened){
      if(this.idx===0){this.targetRow=Math.round(player.y/CELL);this.targetCol=Math.round(player.x/CELL)}
      else if(this.idx===1){this.targetRow=Math.round(player.y/CELL)-2;this.targetCol=Math.round(player.x/CELL)+2}
      else if(this.idx===2){this.targetRow=Math.round(player.y/CELL)+2;this.targetCol=Math.round(player.x/CELL)-2}
      else{this.targetRow=ROWS-3;this.targetCol=1}
    } else {
      this.targetRow=ROWS-2; this.targetCol=Math.floor(Math.random()*COLS);
    }
    // move every N pixels
    this.moved += this.speed;
    while(this.moved >= CELL*0.5){
      this.moved -= CELL*0.5;
      this.moveStep();
    }
    // lerp
    const tx=this.col*CELL+CELL/2, ty=this.row*CELL+CELL/2;
    this.x += (tx-this.x)*0.25;
    this.y += (ty-this.y)*0.25;
  }
  moveStep(){
    const dirs = [{dx:0,dy:-1},{dx:0,dy:1},{dx:-1,dy:0},{dx:1,dy:0}];
    // don't reverse
    const rev = {dx:-this.dir.dx,dy:-this.dir.dy};
    const valid = dirs.filter(d=>{
      if(d.dx===rev.dx&&d.dy===rev.dy) return false;
      const nr=this.row+d.dy, nc=this.col+d.dx;
      if(nr<0||nr>=ROWS||nc<0||nc>=COLS) return false;
      const t=maze[nr][nc];
      return t!==WALL;
    });
    if(!valid.length) return;
    // pick closest to target (or random if frightened)
    let best = valid[0];
    if(this.frightened){
      best = valid[Math.floor(Math.random()*valid.length)];
    } else {
      let bestD = Infinity;
      for(const d of valid){
        const nr=this.row+d.dy, nc=this.col+d.dx;
        const dist=(nr-this.targetRow)**2+(nc-this.targetCol)**2;
        if(dist<bestD){bestD=dist;best=d;}
      }
    }
    this.dir=best;
    this.row+=best.dy; this.col+=best.dx;
    // wrap tunnel row 10
    if(this.col<0)this.col=COLS-1;
    if(this.col>=COLS)this.col=0;
  }
  draw(){
    if(!this.released&&!this.eaten) return;
    const x=this.x, y=this.y+Math.sin(this.waveT)*2;
    const r=CELL*0.42;
    ctx.save();
    if(this.eaten){
      // eyes only
      ctx.globalAlpha=0.5;
      drawEyes(ctx,x,y,r,"#fff");
      ctx.restore(); return;
    }
    const col = this.frightened
      ? (this.frightenTimer<2000&&Math.floor(Date.now()/200)%2===0?"#fff":"#0022ff")
      : this.color;
    // body
    ctx.shadowColor=col; ctx.shadowBlur=10;
    ctx.fillStyle=col;
    ctx.beginPath();
    ctx.arc(x,y-r*0.1,r,Math.PI,0);
    // wavy bottom
    const segs=4;
    for(let i=0;i<=segs;i++){
      const px=x+r*(1-i*2/segs);
      const py=y+r*0.9+(i%2===0?r*0.25:-r*0.25);
      ctx.lineTo(px,py);
    }
    ctx.closePath(); ctx.fill();
    // eyes
    drawEyes(ctx,x,y,r,"#fff");
    ctx.restore();
  }
  checkCollision(){
    if(this.eaten) return;
    const dx=this.x-player.x, dy=this.y-player.y;
    if(Math.sqrt(dx*dx+dy*dy)<CELL*0.7){
      if(this.frightened){
        this.eaten=true; this.eatenTimer=3000;
        score+=200; sfxGhostEat(); updateHUD();
      } else if(!player.dead){
        playerDie();
      }
    }
  }
}
function drawEyes(ctx,x,y,r,col){
  ctx.fillStyle=col;
  ctx.beginPath();ctx.arc(x-r*0.28,y-r*0.1,r*0.22,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+r*0.28,y-r*0.1,r*0.22,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#00f5ff";
  ctx.beginPath();ctx.arc(x-r*0.22,y-r*0.08,r*0.12,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+r*0.34,y-r*0.08,r*0.12,0,Math.PI*2);ctx.fill();
}

// ==================== POWER ====================
let powerTimeout;
function activatePower(){
  clearTimeout(powerTimeout);
  powerActive=true;
  const dur=getDiff(level).powerDuration;
  ghosts.forEach(g=>g.frighten(dur));
  powerTimeout=setTimeout(()=>{powerActive=false;},dur);
}

// ==================== GAME LOOP ====================
let lastTime=0;
function gameLoop(ts){
  const dt = ts-lastTime; lastTime=ts;
  if(gameState!=="playing"){return;}
  ctx.clearRect(0,0,W,H);
  drawMaze();
  player.update();
  ghosts.forEach(g=>{g.update(dt);g.checkCollision();});
  ghosts.forEach(g=>g.draw());
  player.draw();
  animFrame=requestAnimationFrame(gameLoop);
}
function drawMaze(){
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const t=maze[r][c];
      const x=c*CELL,y=r*CELL;
      if(t===WALL){
        ctx.fillStyle="#0d0820";
        ctx.fillRect(x,y,CELL,CELL);
        // neon border glow
        ctx.strokeStyle="rgba(61,26,255,0.6)";
        ctx.lineWidth=1;
        ctx.strokeRect(x+.5,y+.5,CELL-1,CELL-1);
      } else if(t===DOT){
        ctx.fillStyle="rgba(0,245,255,0.7)";
        ctx.beginPath();ctx.arc(x+CELL/2,y+CELL/2,3,0,Math.PI*2);ctx.fill();
      } else if(t===POWER){
        const pulse=0.7+0.3*Math.sin(Date.now()*0.005);
        ctx.fillStyle=`rgba(255,230,0,${pulse})`;
        ctx.shadowColor="#ffe600"; ctx.shadowBlur=10;
        ctx.beginPath();ctx.arc(x+CELL/2,y+CELL/2,7,0,Math.PI*2);ctx.fill();
        ctx.shadowBlur=0;
      }
    }
  }
}

// ==================== GAME MANAGEMENT ====================
function initGame(){
  buildMaze();
  powerActive=false; clearTimeout(powerTimeout);
  player = new Player();
  const d = getDiff(level);
  ghosts = [];
  for(let i=0;i<d.numGhosts;i++) ghosts.push(new Ghost(i));
  updateHUD();
}
function startGame(){
  cancelAnimationFrame(animFrame);
  initGame();
  gameState="playing";
  lastTime=performance.now();
  animFrame=requestAnimationFrame(gameLoop);
}
function playerDie(){
  player.dead=true; lives--; sfxDie(); updateHUD();
  setTimeout(()=>{
    if(lives<=0){triggerLose();}
    else{initGame();}
  },1500);
}
function triggerWin(){
  gameState="won"; sfxWin(); saveScore();
  cancelAnimationFrame(animFrame);
  showOverlay(true);
}
function triggerLose(){
  gameState="lost"; sfxDie(); saveScore();
  cancelAnimationFrame(animFrame);
  showOverlay(false);
}
function showOverlay(win){
  const ov=document.getElementById("overlay");
  document.getElementById("ov-title").textContent=win?"🎉 YOU WIN!":"💀 GAME OVER";
  document.getElementById("ov-title").className="overlay-title "+(win?"win":"lose");
  document.getElementById("ov-msg").textContent=win
    ?`Level ${level} cleared, ${username}!`
    :`Better luck next time, ${username}!`;
  document.getElementById("ov-score").textContent=`Score: ${score.toLocaleString()}`;
  document.getElementById("ov-genlayer").style.display=win?"block":"none";
  const nextBtn=document.getElementById("ov-next-btn");
  nextBtn.style.display=win&&level<10?"inline-block":"none";
  ov.classList.add("active");
}
function hideOverlay(){document.getElementById("overlay").classList.remove("active")}

function updateHUD(){
  const s=score.toLocaleString();
  document.getElementById("hud-score").textContent=s;
  document.getElementById("hud-score-m").textContent=s;
  document.getElementById("hud-level").textContent=level;
  document.getElementById("hud-level-m").textContent=level;
  document.getElementById("hud-dots").textContent=dots;
  document.getElementById("hud-dots-m").textContent=dots;
  [document.getElementById("hud-lives"),document.getElementById("hud-lives-m")].forEach(el=>{
    el.innerHTML="";
    for(let i=0;i<Math.max(0,lives);i++){

      img.src=mascotImg.src; img.className="life-icon";
      el.appendChild(img);
    }
  });
}

// ==================== FIREBASE REST ====================
const FB_URL="https://mochi-hunt-default-rtdb.firebaseio.com/leaderboard";
const IS_LOCAL=location.protocol==="file:";
const LB_KEY="mochi_hunt_lb";

async function saveScore(){
  if(IS_LOCAL){
    const lb=JSON.parse(localStorage.getItem(LB_KEY)||"[]");
    lb.push({name:username,score,level,diff:difficulty,date:new Date().toLocaleDateString()});
    lb.sort((a,b)=>b.score-a.score); lb.splice(50);
    localStorage.setItem(LB_KEY,JSON.stringify(lb));
    return;
  }
  try{
    const res=await fetch(`${FB_URL}.json`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({name:username,score,level,diff:difficulty,date:new Date().toLocaleDateString()})
    });
    if(!res.ok) console.warn("Firebase save error:",res.status);
  }catch(e){console.warn("Firebase save failed:",e);}
}
async function renderLB(){
  const body=document.getElementById("lb-body");
  if(IS_LOCAL){
    const lb=JSON.parse(localStorage.getItem(LB_KEY)||"[]");
    body.innerHTML="";
    if(!lb.length){
      body.innerHTML='<tr><td colspan="4" style="color:rgba(255,255,255,0.3);text-align:center;padding:20px">No scores yet — <span style="color:var(--neon-yellow)">host the file online for global leaderboard</span></td></tr>';
      return;
    }
    lb.slice(0,10).forEach((e,i)=>{
      const tr=document.createElement("tr");
      tr.innerHTML=`<td><span class="rank-badge">${i+1}</span></td>
        <td>${e.name}</td><td style="color:var(--neon-yellow)">${e.score.toLocaleString()}</td>
        <td>Lv.${e.level}</td>`;
      body.appendChild(tr);
    });
    return;
  }
  body.innerHTML='<tr><td colspan="4" style="color:rgba(0,245,255,0.4);text-align:center;padding:20px;font-family:Orbitron,sans-serif;font-size:.75rem;letter-spacing:2px">LOADING...</td></tr>';
  try{
    const res=await fetch(`${FB_URL}.json`);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    console.log("Firebase raw data:", JSON.stringify(data));
    body.innerHTML="";
    if(!data||typeof data!=="object"){
      body.innerHTML='<tr><td colspan="4" style="color:rgba(255,255,255,0.3);text-align:center;padding:20px">No scores yet. Play to earn your spot!</td></tr>';
      return;
    }
    const lb=Object.values(data).sort((a,b)=>b.score-a.score).slice(0,10);
    lb.forEach((e,i)=>{
      const tr=document.createElement("tr");
      tr.innerHTML=`<td><span class="rank-badge">${i+1}</span></td>
        <td>${e.name}</td><td style="color:var(--neon-yellow)">${e.score.toLocaleString()}</td>
        <td>Lv.${e.level}</td>`;
      body.appendChild(tr);
    });
  }catch(e){
    body.innerHTML=`<tr><td colspan="4" style="color:var(--neon-pink);text-align:center;padding:20px">Failed to load scores: ${e.message}</td></tr>`;
    console.warn("Firebase fetch failed:",e);
  }
}

// D-Pad — touch only, no click (prevents double-fire on mobile)
const DPAD_DIRS={
  "dp-up":{dx:0,dy:-1},"dp-down":{dx:0,dy:1},
  "dp-left":{dx:-1,dy:0},"dp-right":{dx:1,dy:0}
};
Object.entries(DPAD_DIRS).forEach(([id,dir])=>{
  const el=document.getElementById(id);
  let iv=null;
  const press=()=>{
    if(gameState!=="playing") return;
    player.setDir(dir.dx,dir.dy);
    el.classList.add("pressed");
    if(iv) clearInterval(iv);
    iv=setInterval(()=>{
      if(gameState==="playing") player.setDir(dir.dx,dir.dy);
    },80);
  };
  const release=()=>{
    clearInterval(iv); iv=null;
    el.classList.remove("pressed");
  };
  el.addEventListener("touchstart",e=>{e.preventDefault();e.stopPropagation();press();},{passive:false});
  el.addEventListener("touchend",e=>{e.preventDefault();e.stopPropagation();release();},{passive:false});
  el.addEventListener("touchcancel",e=>{e.preventDefault();release();},{passive:false});
});
document.getElementById("ov-next-btn").addEventListener("click",()=>{
  hideOverlay(); level=Math.min(level+1,10);
  lives=3; sfxLevelUp(); startGame();
});
document.getElementById("ov-restart-btn").addEventListener("click",()=>{
  hideOverlay(); lives=3; score=0; level=1; startGame();
});
document.getElementById("ov-menu-btn").addEventListener("click",()=>{
  hideOverlay(); cancelAnimationFrame(animFrame);
  gameState="menu"; showScreen("start-screen");
});
document.getElementById("username-input").addEventListener("keydown",e=>{
  if(e.key==="Enter") document.getElementById("start-btn").click();
});

// ==================== CANVAS SETUP ====================
function resizeCanvas(){
  if(!canvas) return;
  const isMobile = window.innerWidth <= 700 || window.innerHeight <= 700;
  let scale;
  if(isMobile){
    // On mobile: canvas takes full width, leave room for HUD (~80px) + actions (~50px) + dpad (~170px)
    const avW = window.innerWidth - 12;
    const avH = window.innerHeight - 320;
    scale = Math.min(avW/W, avH/H, 1);
  } else {
    scale = Math.min(1, (window.innerWidth-220)/W, (window.innerHeight-40)/H);
  }
  scale = Math.max(scale, 0.3);
  canvas.style.width=Math.floor(W*scale)+"px";
  canvas.style.height=Math.floor(H*scale)+"px";
}
window.addEventListener("load",()=>{
  canvas=document.getElementById("game-canvas");
  ctx=canvas.getContext("2d");
  canvas.width=W; canvas.height=H;
  ctx.imageSmoothingEnabled=true;
  resizeCanvas();
});
window.addEventListener("resize", resizeCanvas);
</script>
