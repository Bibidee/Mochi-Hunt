# ============================================================
#  Mochi Hunt — nginx site config (no Docker required)
#  Serves the built frontend (frontend/dist) and reverse-proxies /api to the
#  Node backend. Copy to /etc/nginx/sites-available/ and symlink to
#  sites-enabled/, then `nginx -t && systemctl reload nginx`.
# ============================================================

server {
    listen 80;
    server_name your-domain.example;   # <-- change me

    # Where you copied `frontend/dist` (run `npm run build` first).
    root /var/www/mochi-hunt;
    index index.html;

    # Hashed assets are content-addressed -> cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # The sprite + other public files: cache briefly.
    location ~* \.(jpg|jpeg|png|svg|webp|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Never cache the HTML entry so deploys take effect immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # API -> Node backend (default port 4000). The frontend calls /api
    # same-origin, so no CORS is needed in production.
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;   # on-chain submits can take 1-3 min
    }

    # Single-page fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
